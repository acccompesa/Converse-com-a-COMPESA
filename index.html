<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#1E3D8F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="COMPESA">
<title>Converse com a COMPESA</title>
<style>
:root{
  --petrol:#1E3D8F; --petrol2:#1a3480; --teal:#2E5FC2; --aqua:#6DBE45;
  --bg:#EEF2FA; --card:#FFFFFF; --ink:#1a2a5e; --mut:#5C6E9F;
  --amber:#E8A13C; --line:#C8D5EF; --user:#2E5FC2;
  --ok:#1D9E75; --warn:#E8A13C; --bad:#D85A30; --info:#378ADD;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%; height:-webkit-fill-available;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  background:var(--bg); color:var(--ink); display:flex; flex-direction:column;
  height:100%; height:100dvh; height:-webkit-fill-available;
  overflow:hidden;
  position:fixed; width:100%; top:0; left:0;
  -webkit-overflow-scrolling:touch;
}
/* ---------- header ---------- */
header{
  background:linear-gradient(135deg,var(--petrol) 0%,var(--petrol2) 70%,var(--teal) 100%);
  color:#fff; padding:calc(env(safe-area-inset-top) + 12px) 16px 10px;
  flex:0 0 auto; position:relative; overflow:hidden;
}
.hrow{display:flex; align-items:center; gap:11px}
.logo{
  width:42px;height:42px;flex:0 0 42px;border-radius:50%;
  background:#fff; display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.25);
}
.logo svg{width:26px;height:26px;display:block}
.htxt h1{font-size:16px;font-weight:700;letter-spacing:.2px}
.htxt p{font-size:11.5px;opacity:.78;margin-top:1px}
.hstat{margin-left:auto;text-align:right}
.hstat b{display:block;font-size:14px}
.hstat small{font-size:10px;opacity:.75;text-transform:uppercase;letter-spacing:.6px}
/* ---------- chat ---------- */
#chat{flex:1 1 auto; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; padding:18px 12px 12px; scroll-behavior:auto}
.msg{display:flex; margin:0 0 12px; max-width:100%; animation:pop .22s ease-out}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.user{justify-content:flex-end}
.bub{max-width:86%; padding:10px 13px; border-radius:16px; font-size:14.5px; line-height:1.45; word-wrap:break-word}
.msg.bot .bub{background:var(--card); border:1px solid var(--line); border-bottom-left-radius:5px; box-shadow:0 1px 3px rgba(14,60,68,.07)}
.msg.user .bub{background:var(--user); color:#fff; border-bottom-right-radius:5px}
.bub b{color:var(--petrol)}
.msg.user .bub b{color:#fff}
/* cards inside bot replies */
.pc{border:1px solid var(--line); border-left:4px solid var(--teal); border-radius:10px; padding:9px 10px; margin:8px 0 0; background:#FBFDFD}
.pc .pn{font-weight:700; font-size:13.5px; color:var(--petrol); line-height:1.3}
.pc .pm{font-size:12px; color:var(--mut); margin:3px 0 5px}
.pc .pr{display:flex; flex-wrap:wrap; gap:5px 10px; font-size:12px; align-items:center}
.bdg{display:inline-block; padding:2px 8px; border-radius:99px; font-size:10.5px; font-weight:700; letter-spacing:.2px}
.kp{display:flex; gap:8px; margin-top:8px; flex-wrap:wrap}
.kpi{flex:1 1 40%; background:#F4FAFA; border:1px solid var(--line); border-radius:10px; padding:8px 10px}
.kpi b{display:block; font-size:16px; color:var(--petrol)}
.kpi small{font-size:10.5px; color:var(--mut); text-transform:uppercase; letter-spacing:.4px}
.bar{height:5px;background:#E2ECEC;border-radius:99px;overflow:hidden;flex:1 1 60px;min-width:50px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--aqua));border-radius:99px}
table.tt{border-collapse:collapse;width:100%;margin-top:8px;font-size:12.5px}
table.tt td,table.tt th{padding:5px 6px;border-bottom:1px solid var(--line);text-align:left}
table.tt td:last-child,table.tt th:last-child{text-align:right;white-space:nowrap}
.more{font-size:12px;color:var(--mut);margin-top:6px;font-style:italic}

/* ===== iOS & Mobile Optimization ===== */
@supports(padding: max(0px)) {
  body { padding-left: max(10px, env(safe-area-inset-left)); padding-right: max(10px, env(safe-area-inset-right)); }
}
@media (max-width: 480px) {
  /* Header */
  header { padding: calc(env(safe-area-inset-top) + 10px) 14px 8px; }
  .logo { width: 38px; height: 38px; flex: 0 0 38px; }
  .logo svg { width: 24px; height: 24px; }
  .htxt h1 { font-size: 15px; }
  .htxt p { font-size: 11px; }
  .hstat b { font-size: 13px; }
  .hstat small { font-size: 9px; }
  
  /* Chat bubbles */
  .bub { max-width: 88%; padding: 9px 12px; font-size: 15px; line-height: 1.5; }
  
  /* Cards */
  .pc { padding: 10px 11px; margin: 10px 0 0; }
  .pc .pn { font-size: 14px; }
  .pc .pm { font-size: 12.5px; }
  .pc .pr { font-size: 12.5px; gap: 6px 11px; }
  .bdg { padding: 3px 9px; font-size: 11px; }
  
  /* Input area */
  #q { font-size: 16px; padding: 10px 15px; min-height: 44px; }
  #send { width: 44px; height: 44px; font-size: 17px; flex: 0 0 44px; }
  
  /* Chips */
  #chips { padding: 10px 12px; gap: 6px; }
  .chip { padding: 8px 12px; font-size: 12px; min-height: 40px; display: flex; align-items: center; }
  
  /* KPI cards */
  .kpi { padding: 9px 11px; flex: 1 1 45%; }
  .kpi b { font-size: 15px; }
  .kpi small { font-size: 10px; }
  
  /* Tables */
  table.tt { font-size: 12px; margin-top: 10px; }
  table.tt td, table.tt th { padding: 6px 5px; }
}

@media (max-width: 380px) {
  /* Extra small phones */
  .bub { max-width: 90%; font-size: 14.5px; padding: 8px 11px; }
  .pc { padding: 8px 10px; margin: 8px 0 0; }
  .pc .pn { font-size: 13.5px; }
  #q { font-size: 15px; padding: 9px 14px; }
  .kpi { flex: 1 1 100%; margin-bottom: 6px; }
  #chips { gap: 5px; }
  .chip { padding: 7px 11px; font-size: 11.5px; }
}

/* Landscape orientation */
@media (max-height: 500px) and (orientation: landscape) {
  header { padding: calc(env(safe-area-inset-top) + 8px) 12px 6px; }
  .htxt h1 { font-size: 14px; }
  #chips { padding: 6px 10px; }
  .chip { padding: 6px 10px; font-size: 11px; min-height: 36px; }
  #q { padding: 8px 14px; min-height: 36px; font-size: 15px; }
  #send { width: 36px; height: 36px; font-size: 15px; }
}

.dots{display:inline-flex;gap:4px;padding:4px 2px}
.dots i{width:7px;height:7px;border-radius:50%;background:var(--teal);opacity:.4;animation:bl 1s infinite}
.dots i:nth-child(2){animation-delay:.18s}.dots i:nth-child(3){animation-delay:.36s}
@keyframes bl{0%,100%{opacity:.25;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}
/* ---------- chips ---------- */
#chips{flex:0 0 auto; display:flex; gap:8px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding:8px 12px; scrollbar-width:none; background:linear-gradient(0deg,var(--bg),rgba(237,244,244,0))}
#chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto; background:#fff; border:1px solid var(--line); color:var(--petrol2); font-size:12.5px; font-weight:600; padding:7px 13px; border-radius:99px; cursor:pointer; box-shadow:0 1px 2px rgba(14,60,68,.06)}

}

const norm = s => (s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
const fmtBRL = v => { // v em R$ milhões
  if (v >= 1000) return 'R$ ' + (v/1000).toLocaleString('pt-BR',{maximumFractionDigits:2}) + ' bi';
  if (v >= 1)    return 'R$ ' + v.toLocaleString('pt-BR',{maximumFractionDigits:1}) + ' mi';
  return 'R$ ' + Math.round(v*1000).toLocaleString('pt-BR') + ' mil';
};
const fmtN = v => v.toLocaleString('pt-BR');
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const SCOLOR = {
  'concluido':       ['#E2F4EC','#1D8A66'],
  'em andamento':    ['#E3EEFB','#2F6FB4'],
  'a licitar':       ['#FCF1DE','#B97A14'],
  'em licitacao':    ['#FCE9DC','#C25A23'],
  'a iniciar':       ['#ECEAFB','#6A60C4'],
  'a retomar':       ['#FBE5E5','#C04545'],
  'em projeto':      ['#EFF1F2','#5F6E72']
};
function statusGroup(s){
  const n = norm(s);
  if (n.startsWith('conclu')) return 'concluido';
  if (n.includes('andamento')) return 'em andamento';
  if (n === 'a licitar') return 'a licitar';
  if (n.includes('em licita')) return 'em licitacao';
  if (n.includes('iniciar')) return 'a iniciar';
  if (n.includes('retomar')) return 'a retomar';
  if (n.includes('projeto') || n.includes('elaborar')) return 'em projeto';
  return 'em projeto';
}
const SLABEL = {'concluido':'Concluídas','em andamento':'Em andamento','a licitar':'A licitar','em licitacao':'Em licitação','a iniciar':'A iniciar','a retomar':'A retomar','em projeto':'Em projeto'};
function bdg(s){
  const g = statusGroup(s); const c = SCOLOR[g] || SCOLOR['em projeto'];
  return `<span class="bdg" style="background:${c[0]};color:${c[1]}">${esc(s)}</span>`;
}

/* prazo "Jun/26" | "09/12/2026" -> {y, m} */
const MESES = {jan:1,feb:2,fev:2,mar:3,apr:4,abr:4,may:5,mai:5,jun:6,jul:7,aug:8,ago:8,sep:9,set:9,oct:10,out:10,nov:11,dec:12,dez:12};
function parsePrazo(pz){
  if(!pz) return null;
  let m = pz.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (m) return {y:+m[3], m:+m[2]};
  m = pz.match(/^([A-Za-z]{3})\/(\d{2})$/);
  if (m){ const mm = MESES[m[1].toLowerCase()]; if(mm) return {y:2000+ +m[2], m:mm}; }
  return null;
}
function prazoTxt(p){ if(!p.pz) return ''; return p.pz; }

const MUNIS = (()=>{
  const set = new Set();
  DATA.forEach(p=>{
    (p.m||'').split(/,| e (?=[A-ZÁÉÍÓÚ])|\//).forEach(tok=>{
      let t = tok.trim().replace(/^(distrito[s]? de|zona rural de|sede de|em|de|do|da|no|na)\s+/i,'').replace(/\(.*?\)/g,'').trim();
      if (t.length>2 && !/^(distritos?|zona|passando|al[eé]m|indiretamente|seu|sede|abastecimento|seguran[çc]a)/i.test(t)) set.add(t);
    });
  });
  Object.keys(MUNINFO).forEach(n=>set.add(n));
  return [...set].map(name=>({name, n:norm(name)})).sort((a,b)=>b.n.length-a.n.length);
})();

  const ms = muniShareInfo(p, muNorm);

function muSummaryHtml(muNorm){
  const obras = DATA.filter(p=>norm(p.m).includes(muNorm));
  if (!obras.length) return '';
  const tot = (MUNI_TOTALS[muNorm] !== undefined) ? MUNI_TOTALS[muNorm] : obras.reduce((a,p)=>a+valorParaMunicipio(p, muNorm),0);
  const g = {}; obras.forEach(p=>{ const k=statusGroup(p.s); g[k]=(g[k]||0)+1; });
  const ordem = ['em andamento','concluido','em licitacao','a licitar','a iniciar','em projeto','a retomar'];
  const chips = ordem.filter(k=>g[k]).map(k=>{
    const c = SCOLOR[k];
    return `<span class="bdg" style="background:${c[0]};color:${c[1]}">${SLABEL[k]}: ${g[k]}</span>`;
  }).join(' ');
  return `<div class="pm" style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)">

}

/* ============ motor de busca ============ */
const STOP = new Set(['obras','obra','projetos','projeto','quais','qual','quanto','quanta','quantos','quantas','sao','estao','esta','de','do','da','dos','das','em','no','na','nos','nas','com','para','por','que','tem','existem','existe','mostre','mostra','liste','lista','listar','ver','sobre','status','valor','total','e','o','a','os','as','um','uma','me','os','as','andamento','concluidas','concluidos','licitar','licitacao','iniciar','previsto','prevista','ha','la']);

function applyFilters(q){
  const nq = norm(q);
  let list = DATA.slice();
  const desc = [];
  let muHit = null;

  // status
  const stMap = [
    [/conclu/, 'concluido'], [/\bandamento\b/, 'em andamento'],
    [/a licitar|\blicitar\b/, 'a licitar'], [/em licitacao|\blicitacao\b/, 'em licitacao'],
    [/a iniciar|\biniciar\b/, 'a iniciar'], [/retomar/, 'a retomar'],
    [/elaborar projeto|em projeto|projeto em elaboracao/, 'em projeto'],
    [/atrasad|vencid|critic/, '_late']
  ];
  for (const [re,g] of stMap){
    if (g==='concluido' && /quase conclu|perto de conclu|avancad/.test(nq)) continue;
    if (re.test(nq)){
      if (g === '_late'){
        list = list.filter(p=>{
          if (statusGroup(p.s)==='concluido') return false;
          const d = parsePrazo(p.pz);
          return d && (d.y < 2026 || (d.y===2026 && d.m <= 6));
        });
        desc.push('com prazo vencido ou vencendo até Jun/26 (não concluídas)');
      } else {
        list = list.filter(p=>statusGroup(p.s)===g);
        desc.push(SLABEL[g].toLowerCase());
      }
      break;
    }
  }

  // eixo
  if (/\besgot|sanitari|\bses\b/.test(nq)){ list = list.filter(p=>p.x==='Esgoto'); desc.push('eixo Esgoto'); }
  else if (/abastecimento|\bagua\b|\bsaa\b/.test(nq) && !/adutora|eta\b/.test(nq)){ list = list.filter(p=>p.x==='Abastecimento'); desc.push('eixo Abastecimento'); }

  // fonte
  const fontes = [
    [/novo pac/, 'novo pac', 'Novo PAC'],
    [/\bndb\b|new development/, 'ndb', 'NDB'],
    [/\bafd\b|francesa/, 'afd', 'AFD'],
    [/\bbid\b|interamericano/, 'interamericano', 'BID'],
    [/\bfgts\b/, 'fgts', 'FGTS'],
    [/\bogu\b/, 'ogu', 'OGU'],
    [/\bbrk\b|\bppp\b/, 'ppp', 'PPP/BRK'],
    [/\bbnb\b|banco do nordeste/, 'bnb', 'BNB'],
    [/a captar/, 'a captar', 'A CAPTAR'],
    [/emenda/, 'emenda', 'Emendas'],
    [/\bmidr\b/, 'midr', 'MIDR'],
    [/concessao/, 'concessao', 'Concessão'],
    [/governo do estado|governo de pernambuco/, 'governo', 'Governo de Pernambuco'],
  ];
  for (const [re,key,label] of fontes){
    if (re.test(nq)){ list = list.filter(p=>norm(p.f).includes(key)); desc.push('fonte '+label); break; }
  }

  // carteira
  if (/anexo xiv|anexo 14/.test(nq)){ list=list.filter(p=>norm(p.c).includes('anexo')); desc.push('carteira ANEXO XIV'); }
  else if (/volume minimo/.test(nq)){ list=list.filter(p=>norm(p.c).includes('volume')); desc.push('carteira Volume mínimo'); }
  else if (/seguranca hidrica/.test(nq)){ list=list.filter(p=>norm(p.c).includes('seguranca')); desc.push('carteira Segurança Hídrica'); }

  // município (maior nome primeiro)
  for (const mu of MUNIS){
    if (nq.includes(mu.n)){
      // evita capturar "pernambuco" genérico em frases de fonte
      if (mu.n === 'pernambuco' && /governo/.test(nq)) continue;
      list = list.filter(p=>norm(p.m).includes(mu.n));
      desc.push('em '+mu.name);
      muHit = mu.n;
      break;
    }
  }

  // prazo por ano
  const y4 = nq.match(/\b20(2[4-9]|3[0-9])\b/);
  let year = null;
  if (y4 && /prazo|vence|entrega|conclui|termina/.test(nq) && !/desembolso|investi|fluxo/.test(nq)) year = +y4[0];
  if (year){
    list = list.filter(p=>{ const d=parsePrazo(p.pz); return d && d.y===year && statusGroup(p.s)!=='concluido'; });
    desc.push('com prazo em '+year);
  }

  return {list, desc, nq, year, y4: y4 ? +y4[0] : null, muHit};
}

function freeSearch(nq){
  const toks = nq.split(/[^a-z0-9]+/).filter(t=>(t.length>2 || (t.length===2 && /\d/.test(t))) && !STOP.has(t));
  if (!toks.length) return [];
  const scored = DATA.map(p=>{
    const hay = norm(p.n+' '+p.m+' '+p.o);
    let sc = 0; toks.forEach(t=>{ if (hay.includes(t)) sc++; });
    return {p, sc};
  }).filter(o=>o.sc>0);
  scored.sort((a,b)=>b.sc-a.sc || b.p.v-a.p.v);
  const max = scored.length ? scored[0].sc : 0;
  return scored.filter(o=>o.sc===max && max>=Math.min(2,toks.length)).map(o=>o.p);
}

/* ============ renderização ============ */
function muniShareInfo(p, muNorm){
  // retorna {share, nMun} se a obra atende mais de 1 município e temos a parcela
  // específica do município em foco (muNorm já normalizado, sem acentos)
  if (!muNorm) return null;
  const tbl = MUNI_SHARE[p.n];
  if (!tbl) return null;
  const nMun = Object.keys(tbl).length;
  if (nMun <= 1) return null;
  // procura a chave da tabela que corresponda ao município em foco
  let share = null;
  for (const k in tbl){
    if (k===muNorm || k.includes(muNorm) || muNorm.includes(k)){ share = tbl[k]; break; }
  }
  if (share===null) return null;
  return {share, nMun};
}
function card(p, muNorm){
  const d = [];
  d.push(bdg(p.s));
  if (p.v) d.push(`<b>${fmtBRL(p.v)}</b>`);
  if (statusGroup(p.s)!=='concluido' && p.e>0) d.push(`<span class="bar"><i style="width:${p.e}%"></i></span> ${p.e}%`);
  if (p.pz) d.push(`⏱ ${esc(p.pz)}`);
  if (p.pt) d.push(`<span class="bdg" style="background:#FDEFE3;color:#B5651D">tolerância: ${esc(p.pt)}</span>`);
  let extra = '';
  const ms = muniShareInfo(p, muNorm);
  if (ms) extra += `<div class="pm" style="margin:5px 0 0;color:var(--petrol)">📍 Obra atende <b>${ms.nMun} municípios</b> · valor total: <b>${fmtBRL(p.v)}</b> · parcela deste município: <b>${fmtBRL(ms.share)}</b></div>`;
  if (p.px && statusGroup(p.s)!=='concluido') extra += `<div class="pm" style="margin:5px 0 0">➜ ${esc(p.px)}${p.pxz ? ' · '+esc(p.pxz):''}</div>`;
  return `<div class="pc"><div class="pn">${esc(p.n)}</div>${p.f?`<div class="pm">${esc(p.f)}</div>`:''}<div class="pr">${d.join(' ')}</div>${extra}</div>`;
}
const ST_RANK = {'em andamento':1,'a iniciar':2,'em licitacao':3,'a licitar':4,'em projeto':5,'a retomar':6,'concluido':7};
function sortByStatus(a,b){
  const ra = ST_RANK[statusGroup(a.s)]||5, rb = ST_RANK[statusGroup(b.s)]||5;
  return ra-rb || b.v-a.v;
}
function listReply(list, desc, intro, muNorm){
  const tot = list.reduce((a,p)=>a+p.v,0);
  let h = intro || '';
  const sorted = list.slice().sort(sortByStatus);
  sorted.slice(0,8).forEach(p=> h += card(p, muNorm));
  if (list.length>8) h += `<div class="more">… e mais ${list.length-8} obras. Refine a pergunta (ex.: por município ou status) para ver outras.</div>`;
  return h;
}

/* ============ intents ============ */
function answer(q){
  const nq = norm(q);

  // saudação / ajuda
  if (/^(oi|ola|bom dia|boa tarde|boa noite|hey|eai)\b/.test(nq) || /ajuda|o que voce (faz|sabe)|como (usar|funciona)/.test(nq)){
    return `Olá! 👋 Eu respondo com base no <b>Plano de Investimentos COMPESA (Jun/2026)</b>. Você pode perguntar, por exemplo:<br><br>
    • "Obras em andamento em <b>Caruaru</b>"<br>
    • "Quanto está previsto de <b>desembolso em 2027</b>?"<br>
    • "Status da <b>Adutora do Agreste Lote 5C</b>"<br>
    • "Maiores obras do <b>Novo PAC</b>"<br>
    • "Obras de <b>esgoto a licitar</b>"<br>
    • "<b>Rodízio</b> em Caruaru" (atual e pós-obras)<br>
    • "O que vence em <b>2026</b>?"`;
  }

  const {list, desc, year, y4, muHit} = applyFilters(q);
  const rz = muHit ? rodizioCard(muHit) : '';
  const filtered = desc.length>0;

  // desembolso por ano
  if (/desembolso|investir|previsao|fluxo/.test(nq) || (/quanto/.test(nq) && y4)){
    const yy = y4 && y4>=2026 && y4<=2030 ? y4 : null;
    const base = filtered ? list : DATA;
    if (yy){
      const k = 'p'+String(yy).slice(2);
      const tot = base.reduce((a,p)=>a+(p[k]||0),0);
      const top = base.filter(p=>p[k]>0).sort((a,b)=>b[k]-a[k]).slice(0,5);
      let h = `O desembolso previsto para <b>${yy}</b>${desc.length?' ('+desc.join(', ')+')':''} é de <b>${fmtBRL(tot)}</b>.<br>Maiores previsões no ano:`;
      h += '<table class="tt">'+top.map(p=>`<tr><td>${esc(p.n.length>52?p.n.slice(0,50)+'…':p.n)}</td><td>${fmtBRL(p[k])}</td></tr>`).join('')+'</table>';
      return h;
    }
    // série 2026-2030
    const ks=['p26','p27','p28','p29','p30'];
    let h = `Previsão de desembolso da carteira${desc.length?' ('+desc.join(', ')+')':''}:<table class="tt"><tr><th>Ano</th><th>Valor</th></tr>`;
    ks.forEach((k,i)=>{ const t=base.reduce((a,p)=>a+(p[k]||0),0); h+=`<tr><td>20${k.slice(1)}</td><td><b>${fmtBRL(t)}</b></td></tr>`; });
    return h+'</table>';
  }

  // resumo geral
  if (/resumo|visao geral|panorama|kpi|carteira total|\btotal\b.*carteira|carteira.*\btotal\b/.test(nq) && !filtered){
    const tot = DATA.reduce((a,p)=>a+p.v,0);
    const g = {}; DATA.forEach(p=>{ const k=statusGroup(p.s); g[k]=(g[k]||0)+1; });
    const ex = DATA.filter(p=>statusGroup(p.s)==='em andamento').reduce((a,p)=>a+p.v,0);
    const p26 = DATA.reduce((a,p)=>a+p.p26,0);
    let h = `📊 <b>Resumo da carteira — Jun/2026</b>
    <div class="kp">
      <div class="kpi"><b>${fmtBRL(tot)}</b><small>Carteira total</small></div>
      <div class="kpi"><b>${DATA.length}</b><small>Obras / projetos</small></div>
      <div class="kpi"><b>${fmtBRL(ex)}</b><small>Em execução</small></div>
      <div class="kpi"><b>${fmtBRL(p26)}</b><small>Previsto 2026</small></div>
    </div>
    Por status:<table class="tt">`;
    Object.entries(g).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=> h+=`<tr><td>${SLABEL[k]}</td><td><b>${v}</b></td></tr>`);
    h += `</table><div class="more">Eixos: ${DATA.filter(p=>p.x==='Abastecimento').length} de abastecimento · ${DATA.filter(p=>p.x==='Esgoto').length} de esgoto.</div>`;
    return h;
  }

  // maiores / top
  if (/maior|maiores|top|principais|mais car/.test(nq)){
    const base = (filtered?list:DATA).filter(p=>statusGroup(p.s)!=='concluido' || /conclu/.test(nq));
    const top = base.slice().sort((a,b)=>b.v-a.v).slice(0,6);
    let h = rz + `🏗️ Maiores obras${desc.length?' ('+desc.join(', ')+')':''} por valor:`;
    top.forEach(p=>h+=card(p, muHit));
    return h;
  }

  // população
  if (/populacao|pessoas|habitantes|beneficiad/.test(nq)){
    const base = filtered?list:DATA;
    const pop = base.reduce((a,p)=>a+(p.pop||0),0);
    return `As obras${desc.length?' '+desc.join(', '):' da carteira'} somam uma população beneficiada de aproximadamente <b>${fmtN(pop)} pessoas</b> (soma simples por obra; pode haver sobreposição entre projetos no mesmo município).`;
  }

  // prazo de tolerância / risco de atraso
  if (/toleran|risco de atraso|prazo contratual/.test(nq)){
    const base = (filtered?list:DATA).filter(p=>p.pt);
    if (!base.length) return 'Não encontrei obras com prazo de tolerância cadastrado nesse recorte.';
    return listReply(base, desc, `Obras com prazo de tolerância definido (<b>${base.length}</b>):`, muHit);
  }

  // quase concluídas
  if (/quase conclu|avancad|perto de conclu/.test(nq)){
    const base = (filtered?list:DATA).filter(p=>statusGroup(p.s)!=='concluido' && p.e>=70);
    if (!base.length) return 'Não encontrei obras não concluídas com execução acima de 70% nesse recorte.';
    return listReply(base, desc, `Obras com execução ≥ 70% ainda não concluídas (<b>${base.length}</b>):`, muHit);
  }

  // contagem
  if (/^quant|quantas|quantos/.test(nq) && filtered){
    const tot = list.reduce((a,p)=>a+p.v,0);
    let h = rz + `São <b>${list.length}</b> obras ${desc.join(', ')}, somando <b>${fmtBRL(tot)}</b>.`;
    if (list.length && list.length<=8){ list.slice().sort(sortByStatus).forEach(p=>h+=card(p, muHit)); }
    else if (list.length) h += ` Quer que eu liste as principais?`;
    return h;
  }

  // municípios não operados pela COMPESA
  if (/nao (sao |e )?operad|outros prestadores|municipios.*(fora|sem operacao)/.test(nq) && !muHit){
    return `⚠️ <b>${NAO_OP.length} municípios</b> de Pernambuco possuem sistemas operados por <b>outros prestadores</b> (prefeituras ou concessionárias municipais), sem operação direta da COMPESA:<br><br>` + NAO_OP.map(n=>'• '+esc(n)).join('<br>') + `<br><br>As obras da carteira que citam esses municípios referem-se a sistemas regionais da COMPESA que os beneficiam.`;
  }

  // pergunta direta sobre rodízio
  if (/rodizio|abastecimento.*(atual|hoje)|calendario de agua/.test(nq) && muHit){
    return rz || `Não tenho informação de rodízio cadastrada para esse município.`;
  }

  // filtros aplicados → lista
  if (filtered){
    if (!list.length) return rz + `Não encontrei obras ${desc.join(', ')} nesse recorte. Tente outro município, status ou fonte.`;
    return rz + listReply(list, desc, null, muHit);
  }

  // busca livre por nome
  const hits = freeSearch(nq);
  if (hits.length){
    if (hits.length === 1){
      const p = hits[0];
      const ks=['p26','p27','p28','p29','p30'];
      let h = `Aqui está o que tenho sobre essa obra:` + card(p);
      const fluxo = ks.filter(k=>p[k]>0).map(k=>`20${k.slice(1)}: ${fmtBRL(p[k])}`).join(' · ');
      if (fluxo) h += `<div class="more">Desembolso previsto → ${fluxo}</div>`;
      if (p.pop) h += `<div class="more">População beneficiada: ${fmtN(p.pop)} pessoas · Objetivo: ${esc(p.o)}</div>`;
      const tbl = MUNI_SHARE[p.n];
      if (tbl && Object.keys(tbl).length>1){
        const rows = Object.entries(tbl).sort((a,b)=>b[1]-a[1]);
        const nomesOriginais = (p.m||'').split(/,| e (?=[A-ZÁÉÍÓÚ])|\//).map(t=>t.trim()).filter(Boolean);
        const lookup = {}; nomesOriginais.forEach(n=>{ lookup[norm(n)] = n; });
        h += `<div class="pm" style="margin-top:8px"><b style="color:var(--petrol)">Divisão do investimento por município</b> (total: ${fmtBRL(p.v)}):</div>`;
        h += '<table class="tt">'+rows.map(([k,v])=>`<tr><td>${esc(lookup[k]||k)}</td><td>${fmtBRL(v)}</td></tr>`).join('')+'</table>';
      }
      return h;
    }
    return listReply(hits, [], `Encontrei <b>${hits.length}</b> obras relacionadas a "<b>${esc(q)}</b>":`);
  }

  return `Hmm, não consegui localizar isso na carteira. 🤔 Tente perguntar por <b>município</b> ("obras em Petrolina"), <b>status</b> ("a licitar"), <b>fonte</b> ("Novo PAC", "NDB", "AFD"), <b>prazo</b> ("vence em 2026") ou pelo <b>nome da obra</b>.`;
}

/* ============ UI ============ */
const chat = document.getElementById('chat');
function add(html, who){
  const m = document.createElement('div'); m.className='msg '+who;
  m.innerHTML = `<div class="bub">${html}</div>`;
  chat.appendChild(m); chat.scrollTop = chat.scrollHeight;
  return m;
}
function ask(q){
  if(!q.trim()) return;
  add(esc(q),'user');
  const t = add('<span class="dots"><i></i><i></i><i></i></span>','bot');
  setTimeout(()=>{ t.querySelector('.bub').innerHTML = answer(q); chat.scrollTop = chat.scrollHeight; }, 350 + Math.random()*350);
}
document.getElementById('send').onclick = ()=>{ const i=document.getElementById('q'); ask(i.value); i.value=''; };
document.getElementById('q').addEventListener('keydown', e=>{ if(e.key==='Enter'){ ask(e.target.value); e.target.value=''; }});
document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>ask(c.dataset.q));

/* header stats + saudação */
(function(){
  const tot = DATA.reduce((a,p)=>a+p.v,0);
  document.getElementById('hsTot').textContent = fmtBRL(tot);
  document.getElementById('hsN').textContent = DATA.length + ' obras';
  add(`💧 <b>Olá! Sou o Assistente de Investimentos COMPESA.</b><br><br>Tenho acesso ao <b>Plano de Investimentos Compesa (Jun/2026)</b> - totalizando <b>R$ 15,87 bilhões</b>.<br><br>Posso te ajudar com:<br>🏗️ Status e andamento de obras<br>📍 Investimentos por município<br>💰 Fontes de recursos (Novo PAC, NDB, BID…)<br>📅 Prazos e desembolsos<br><br>Toque em uma sugestão ou faça sua pergunta. 👇`,'bot');
})();
/* ============ iOS keyboard fix ============ */
(function(){
  // Use Visual Viewport API to handle iOS keyboard resizing
  if (window.visualViewport) {
    const inbar = document.getElementById('inbar');
    function onViewportChange() {
      const vv = window.visualViewport;
      // Calculate offset from bottom of layout viewport
      const offsetBottom = window.innerHeight - vv.height - vv.offsetTop;
      document.body.style.height = vv.height + 'px';
      inbar.style.paddingBottom = 'max(' + Math.max(0, offsetBottom) + 'px, calc(env(safe-area-inset-bottom) + 10px))';
      chat.scrollTop = chat.scrollHeight;
    }
    window.visualViewport.addEventListener('resize', onViewportChange);
    window.visualViewport.addEventListener('scroll', onViewportChange);
  }
})();
</script>
